<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#1469d2"><title>Chanel & Armani – Remastered HD</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"></head><body>
<div id="app">
 <canvas id="game" width="1280" height="720" aria-label="Chanel und Armani Spiel"></canvas>
 <div id="menu" class="panel show">
  <img class="logo" src="assets/title_logo.png" alt="Chanel & Armani Adventure">
  <h1>REMASTERED HD</h1><p class="tag">Reise durch drei Welten und besiege die Könige!</p>
  <div class="difficulty"><button data-diff="easy">LEICHT<br><small>Löwenkönig · 5 Leben</small></button><button data-diff="normal" class="selected">MITTEL<br><small>Löwenkönig · 4 Leben</small></button><button data-diff="hard">SCHWER<br><small>Bärenkönig · Hauptboss</small></button></div>
  <button id="start" class="primary">SPIEL STARTEN</button><button id="continue">FORTSETZEN</button>
  <p class="help">PC: ← → / A D · Springen: ↑ / W / Leertaste · Figur wechseln: F<br>Touch: rote Tasten unten</p>
 </div>
 <div id="pause" class="panel"><h2>PAUSE</h2><button id="resume" class="primary">WEITERSPIELEN</button><button id="restart">LEVEL NEU STARTEN</button><button id="home">HAUPTMENÜ</button></div>
 <div id="message" class="panel"><h2 id="messageTitle"></h2><p id="messageText"></p><button id="messageBtn" class="primary">WEITER</button></div>
 <div id="hud"><div><b id="heroName">CHANEL</b> ❤️ <span id="lives">4</span></div><div>🦴 <span id="bones">0</span> &nbsp; ⭐ <span id="score">0</span></div><div>LEVEL <span id="level">1-1</span></div><button id="pauseBtn">Ⅱ</button></div>
 <div id="bossHud"><span id="bossName">LÖWENKÖNIG</span><div class="bar"><i id="bossBar"></i></div></div>
 <div id="touch"><button id="left">◀</button><button id="right">▶</button><button id="switch">↻</button><button id="jump">▲</button></div>
</div><script src="game.js"></script></body></html>
